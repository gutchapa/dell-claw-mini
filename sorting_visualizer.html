<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithm Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8892b0;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-sort {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-sort:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: white;
        }

        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 75, 43, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .slider-label {
            font-size: 0.9rem;
            color: #8892b0;
        }

        .slider-value {
            font-weight: 600;
            color: #00d4ff;
        }

        input[type="range"] {
            width: 200px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            cursor: pointer;
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            cursor: pointer;
            border: none;
        }

        .array-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 400px;
            width: 100%;
            max-width: 1000px;
            gap: 2px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bar {
            flex: 1;
            background: linear-gradient(180deg, #00d4ff 0%, #7b2cbf 100%);
            border-radius: 4px 4px 0 0;
            transition: height 0.1s ease;
            position: relative;
            min-width: 8px;
        }

        .bar.comparing {
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 100%) !important;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .bar.swapping {
            background: linear-gradient(180deg, #ff416c 0%, #ff4b2b 100%) !important;
            box-shadow: 0 0 15px rgba(255, 65, 108, 0.5);
        }

        .bar.sorted {
            background: linear-gradient(180deg, #00ff88 0%, #00cc66 100%) !important;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #8892b0;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00d4ff;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-color.default {
            background: linear-gradient(180deg, #00d4ff, #7b2cbf);
        }

        .legend-color.comparing {
            background: linear-gradient(180deg, #ffd700, #ff8c00);
        }

        .legend-color.swapping {
            background: linear-gradient(180deg, #ff416c, #ff4b2b);
        }

        .legend-color.sorted {
            background: linear-gradient(180deg, #00ff88, #00cc66);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .controls {
                flex-direction: column;
                width: 100%;
            }
            
            input[type="range"] {
                width: 150px;
            }
            
            .array-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <h1>Sorting Algorithm Visualizer</h1>
    <p class="subtitle">Bubble Sort Implementation with Real-time Animation</p>

    <div class="controls">
        <button class="btn-generate" onclick="generateArray()">Generate New Array</button>
        <button class="btn-sort" onclick="startSort()" id="sortBtn">Start Sorting</button>
        <button class="btn-stop" onclick="stopSort()" id="stopBtn" disabled>Stop</button>
        
        <div class="slider-container">
            <span class="slider-label">Animation Speed</span>
            <input type="range" id="speedSlider" min="1" max="100" value="50">
            <span class="slider-value" id="speedValue">50ms</span>
        </div>
    </div>

    <div class="array-container" id="arrayContainer"></div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-label">Comparisons</div>
            <div class="stat-value" id="comparisons">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Swaps</div>
            <div class="stat-value" id="swaps">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Array Size</div>
            <div class="stat-value" id="arraySize">50</div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-color default"></div>
            <span>Unsorted</span>
        </div>
        <div class="legend-item">
            <div class="legend-color comparing"></div>
            <span>Comparing</span>
        </div>
        <div class="legend-item">
            <div class="legend-color swapping"></div>
            <span>Swapping</span>
        </div>
        <div class="legend-item">
            <div class="legend-color sorted"></div>
            <span>Sorted</span>
        </div>
    </div>

    <script>
        let array = [];
        let bars = [];
        let isSorting = false;
        let stopRequested = false;
        let comparisons = 0;
        let swapCount = 0;
        const arraySize = 50;
        const container = document.getElementById('arrayContainer');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const comparisonsDisplay = document.getElementById('comparisons');
        const swapsDisplay = document.getElementById('swaps');
        const arraySizeDisplay = document.getElementById('arraySize');
        const sortBtn = document.getElementById('sortBtn');
        const stopBtn = document.getElementById('stopBtn');

        // Speed calculation: slider 1-100 maps to delay 200ms-1ms
        function getDelay() {
            const sliderVal = parseInt(speedSlider.value);
            return Math.max(1, 201 - (sliderVal * 2));
        }

        speedSlider.addEventListener('input', () => {
            speedValue.textContent = getDelay() + 'ms';
        });

        function generateArray() {
            if (isSorting) {
                stopRequested = true;
                return;
            }
            
            array = [];
            container.innerHTML = '';
            bars = [];
            comparisons = 0;
            swapCount = 0;
            updateStats();
            
            for (let i = 0; i < arraySize; i++) {
                const value = Math.floor(Math.random() * 90) + 10;
                array.push(value);
                
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = value + '%';
                container.appendChild(bar);
                bars.push(bar);
            }
            
            arraySizeDisplay.textContent = arraySize;
        }

        function updateStats() {
            comparisonsDisplay.textContent = comparisons;
            swapsDisplay.textContent = swapCount;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function bubbleSort() {
            isSorting = true;
            stopRequested = false;
            sortBtn.disabled = true;
            stopBtn.disabled = false;
            
            const n = array.length;
            
            for (let i = 0; i < n - 1; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    if (stopRequested) {
                        resetButtons();
                        return;
                    }
                    
                    // Visualize comparison
                    bars[j].classList.add('comparing');
                    bars[j + 1].classList.add('comparing');
                    comparisons++;
                    updateStats();
                    
                    await sleep(getDelay());
                    
                    if (array[j] > array[j + 1]) {
                        // Visualize swap
                        bars[j].classList.remove('comparing');
                        bars[j + 1].classList.remove('comparing');
                        bars[j].classList.add('swapping');
                        bars[j + 1].classList.add('swapping');
                        
                        // Perform swap
                        const temp = array[j];
                        array[j] = array[j + 1];
                        array[j + 1] = temp;
                        
                        // Update heights
                        bars[j].style.height = array[j] + '%';
                        bars[j + 1].style.height = array[j + 1] + '%';
                        
                        swapCount++;
                        updateStats();
                        
                        await sleep(getDelay());
                        
                        bars[j].classList.remove('swapping');
                        bars[j + 1].classList.remove('swapping');
                    } else {
                        bars[j].classList.remove('comparing');
                        bars[j + 1].classList.remove('comparing');
                    }
                }
                
                // Mark as sorted
                bars[n - i - 1].classList.add('sorted');
            }
            
            // Mark first element as sorted
            bars[0].classList.add('sorted');
            
            // Flash effect to show completion
            for (let i = 0; i < 3; i++) {
                bars.forEach(bar => bar.style.opacity = '0.5');
                await sleep(100);
                bars.forEach(bar => bar.style.opacity = '1');
                await sleep(100);
            }
            
            resetButtons();
        }

        function resetButtons() {
            isSorting = false;
            sortBtn.disabled = false;
            stopBtn.disabled = true;
        }

        function startSort() {
            if (array.length === 0) {
                generateArray();
            }
            bubbleSort();
        }

        function stopSort() {
            stopRequested = true;
        }

        // Initialize
        generateArray();
    </script>
</body>
</html>
